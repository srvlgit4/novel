services:
  # Backend Web Service
  - type: web
    name: web-novel-backend
    env: node
    repo: https://github.com/yourusername/web-novel-mvp
    rootDir: backend
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: GROUP_INVITE_LINK
        sync: false

  # Frontend Static Site
  - type: web
    name: web-novel-frontend
    env: static
    repo: https://github.com/yourusername/web-novel-mvp
    rootDir: frontend
    buildCommand: "npm run build"
    publishDir: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
        value: https://your-backend-url.onrender.com
